/* Custom Cursor */

a, button, [onclick], select, input[type="submit"], .nav-btn, .scheme-option, .category-card, .novel-card, .link-card, .interest-card, .back-to-top, .theme-toggle, .admin-toggle, .color-scheme-toggle { cursor: url('cursors/リンクの選択.ani') 6 0, pointer; }

html { scroll-behavior: smooth; }
body {
  font-family: var(--font-serif);
  background-color: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.8;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.4s ease, color 0.4s ease;
  position: relative;
}

/* Dot pattern - single color by default, dual for coral & night */
body::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(circle, var(--accent-primary) 1.5px, transparent 1.5px),
    radial-gradient(circle, var(--accent-primary) 1.5px, transparent 1.5px);
  background-size: 24px 24px;
  background-position: 0 0, 12px 12px;
  pointer-events: none;
  z-index: -1;
  opacity: 0.06;
  transition: opacity 0.3s ease;
}

[data-theme="dark"] body::before {
  opacity: 0.04;
}

/* Dual-color dot pattern for coral & night */
[data-color-scheme="coral"] body::before,
[data-color-scheme="night"] body::before {
  background-image:
    radial-gradient(circle, var(--accent-primary) 1.5px, transparent 1.5px),
    radial-gradient(circle, var(--accent-secondary) 1.5px, transparent 1.5px);
}

/* Screen reader only */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* Gothic border decoration with lace effect */
.lace-border {
  position: relative;
  border: 1px solid var(--border-light);
}
.lace-border::before {
  content: '';
  position: absolute;
  top: -4px;
  left: 0;
  right: 0;
  height: 4px;
  background-image:
    radial-gradient(circle at 0 4px, transparent 3px, var(--accent-primary) 3px, var(--accent-primary) 4px, transparent 4px),
    radial-gradient(circle at 8px 4px, transparent 3px, var(--accent-primary) 3px, var(--accent-primary) 4px, transparent 4px),
    radial-gradient(circle at 16px 4px, transparent 3px, var(--accent-primary) 3px, var(--accent-primary) 4px, transparent 4px);
  background-size: 16px 4px;
  background-repeat: repeat-x;
  opacity: 0.4;
}
.lace-border::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  right: 0;
  height: 4px;
  background-image:
    radial-gradient(circle at 0 0, transparent 3px, var(--accent-primary) 3px, var(--accent-primary) 4px, transparent 4px),
    radial-gradient(circle at 8px 0, transparent 3px, var(--accent-primary) 3px, var(--accent-primary) 4px, transparent 4px),
    radial-gradient(circle at 16px 0, transparent 3px, var(--accent-primary) 3px, var(--accent-primary) 4px, transparent 4px);
  background-size: 16px 4px;
  background-repeat: repeat-x;
  opacity: 0.4;
}

/* Corner gothic cross decoration */
.rose-corner {
  position: relative;
}
.rose-corner::before {
  content: '';
  position: absolute;
  top: 6px;
  right: 6px;
  width: 14px;
  height: 14px;
  opacity: 0.6;
  border: 2px solid var(--accent-primary);
}
.rose-corner::after {
  content: '';
  position: absolute;
  top: 10px;
  right: 10px;
  width: 6px;
  height: 6px;
  opacity: 0.6;
  border: 2px solid var(--accent-primary);
  border-radius: var(--radius-sm);
}

/* Theme Toggle */
.theme-toggle {
  width: 40px; height: 40px;
  border: 1px solid var(--border-light);
  background: var(--bg-card); color: var(--text-secondary);
  font-size: 1rem; cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
}
.theme-toggle:hover { background: var(--accent-primary); color: white; border-color: var(--accent-primary); transform: scale(1.1); }

/* Top Toolbar */
.top-toolbar {
  position: fixed; top: 16px; right: 16px; z-index: 1000;
  display: flex; gap: 8px; align-items: center;
  transition: transform 0.3s ease;
}

/* Color Scheme Dropdown */
.color-scheme-dropdown { position: relative; flex-shrink: 0; }
.color-scheme-toggle {
  width: 40px; height: 40px;
  border: 1px solid var(--border-light);
  background: var(--bg-card); color: var(--text-secondary);
  font-size: 1rem; cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
}
.color-scheme-toggle:hover { background: var(--accent-primary); color: white; border-color: var(--accent-primary); transform: scale(1.1); }
.scheme-current-dot {
  display: block; width: 14px; height: 14px;
  border-radius: 50%;
  border: 1.5px solid rgba(128,128,128,0.15);
}
.color-scheme-menu {
  display: none;
  position: absolute;
  top: 44px;
  right: 0;
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  z-index: 1001;
  min-width: 140px;
  box-shadow: var(--shadow-hover);
  border-radius: var(--radius-sm);
}
.color-scheme-menu.active { display: block; }
.scheme-option {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 8px 12px;
  background: transparent; border: none;
  cursor: pointer; transition: var(--transition);

}

/* Admin Toggle */

/* Canvas Background - Disabled */
#bgCanvas { display: none; }

/* Back to Top Button */
.back-to-top {

  bottom: 90px;
  right: 20px;

  height: 40px;

}

/* Layout */
.app-container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px; }

/* Header - Gothic Cathedral Style */
.site-header { text-align: center; padding: 60px 0 30px; position: relative; display: flex; flex-direction: column; align-items: center; }

.site-title { font-family: var(--font-display); font-size: 2.8rem; color: var(--text-primary); letter-spacing: 10px; position: relative; display: flex; align-items: center; justify-content: center; }
.site-title .star-left, .site-title .star-right { position: absolute; top: 50%; transform: translateY(-50%); font-size: 0.6rem; color: var(--accent-primary); opacity: 0.5; animation: twinkle 2s ease-in-out infinite; }
.site-title .star-left { left: -24px; animation-delay: 0s; }
.site-title .star-right { right: -24px; animation-delay: 1s; }
@keyframes twinkle {
  0%, 100% { opacity: 0.3; transform: translateY(-50%) scale(0.8); }
  50% { opacity: 0.8; transform: translateY(-50%) scale(1.2); }
}
.site-subtitle { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 6px; text-transform: uppercase; display: block; text-align: center; margin-bottom: 0; }
.site-divider {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
  background-size: 200% 100%;
  animation: dividerGlow 3s ease-in-out infinite;
  margin: 16px auto 0;
  opacity: 0.5;
  transition: var(--transition);
  flex-shrink: 0;
}
@keyframes dividerGlow {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Navigation with star-moon divider */
.nav-bar { display: flex; justify-content: center; gap: 8px; padding: 15px 0; margin-bottom: 40px; flex-wrap: wrap; position: relative; }
.nav-bar::after {
  content: '\2727  \263E  \2727';
  position: absolute;
  bottom: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  color: var(--accent-primary);
  opacity: 0.35;
  letter-spacing: 6px;
  white-space: pre;
}
.nav-btn {
  padding: 6px 16px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: var(--font-serif);
  font-size: 0.85rem;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
}
.nav-btn::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 50%; width: 0; height: 1px;
  background: var(--accent-primary);
  transition: var(--transition);
  transform: translateX(-50%);
}
.nav-btn:hover { color: var(--text-primary); }
.nav-btn:hover::after { width: 80%; }
.nav-btn.active { color: var(--accent-primary); }
.nav-btn.active::after { width: 80%; }

/* Page Sections */
.page { display: none; opacity: 0; transform: translateY(20px) scale(0.98); outline: none !important; }
.page.active { display: block; opacity: 1; transform: translateY(0) scale(1); animation: pageFadeIn 0.4s ease; }
@keyframes pageFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

/* Staggered fade-in for lists */
@keyframes staggerFadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Scroll reveal */
.scroll-reveal {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.scroll-reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Floating decorative elements */
.floating-deco {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  opacity: 0.15;
  animation: float 6s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(10deg); }
}

/* Glow pulse animation for accent elements */
.glow-pulse {
  animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 5px rgba(122, 158, 138, 0.2); }
  50% { box-shadow: 0 0 20px rgba(122, 158, 138, 0.4), 0 0 40px rgba(122, 158, 138, 0.2); }
}

/* Shimmer effect for titles */
.shimmer {
  position: relative;
  overflow: hidden;
}
.shimmer::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(122, 158, 138, 0.1), transparent);
  animation: shimmer 4s ease-in-out infinite;
}
@keyframes shimmer {
  0% { left: -100%; }
  100% { left: 200%; }
}

/* Bounce in animation */
@keyframes bounceIn {
  0% { opacity: 0; transform: scale(0.3); }
  50% { transform: scale(1.05); }
  70% { transform: scale(0.9); }
  100% { opacity: 1; transform: scale(1); }
}

/* Rotate decoration */
@keyframes slowRotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ===== NEW ANIMATIONS ===== */

/* Card shine sweep on hover */
.card-shine { position: relative; overflow: hidden; }
.card-shine::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  transition: none;
  z-index: 1;
  pointer-events: none;
}
.card-shine:hover::before {
  animation: shineSweep 0.6s ease forwards;
}
@keyframes shineSweep {
  to { left: 150%; }
}

/* Nav button ripple effect */
.nav-btn { overflow: hidden; }
.nav-btn::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 0; height: 0;
  background: var(--accent-primary);
  opacity: 0.1;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.4s ease, height 0.4s ease, opacity 0.4s ease;
  pointer-events: none;
}

  width: 120px; height: 120px;
  opacity: 0.06;
}

/* Avatar hover rotation */
.avatar-wrapper { transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
.avatar-wrapper:hover { transform: rotate(8deg) scale(1.05); }

/* Stat number count-up animation */
.stat-number {
  display: inline-block;
  font-variant-numeric: tabular-nums;
}

/* Novel item hover slide indicator */
.novel-item { position: relative; overflow: hidden; }
.novel-item::after {
  content: '';
  position: absolute;
  left: 0; top: 0; width: 3px; height: 100%;
  background: var(--accent-primary);
  transform: scaleY(0);
  transform-origin: top;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.novel-item:hover::after {
  transform: scaleY(1);
}

/* Category card tilt effect */
.category-card { transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s ease, box-shadow 0.3s ease; }

/* Page transition slide */
.page { }

/* Floating particles background */
.bg-particles {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bg-particle {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--accent-primary);
  opacity: 0;
  border-radius: 50%;
  animation: particleFloat linear infinite;
}
@keyframes particleFloat {
  0% { opacity: 0; transform: translateY(100vh) scale(0); }
  10% { opacity: 0.15; }
  90% { opacity: 0.15; }
  100% { opacity: 0; transform: translateY(-10vh) scale(1); }
}

/* Social link hover bounce */
.social-link { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.3s ease, border-color 0.3s ease; }
.social-link:hover { transform: translateY(-3px); }

/* Tag hover color fill */
.novel-tag:nth-child(even) {
  color: var(--accent-secondary, var(--accent-primary));
  background: var(--accent-secondary-glow, rgba(122, 158, 138, 0.06));
}
/* Darken secondary color for readability on light backgrounds */
[data-color-scheme="coral"] .novel-tag:nth-child(even) {
  color: #7aadd0;
  background: rgba(186, 219, 242, 0.15);
}
[data-color-scheme="night"] .novel-tag:nth-child(even) {
  color: #6a4a8a;
  background: rgba(70, 38, 110, 0.08);
}
.novel-tag {
  transition: background 0.3s ease, color 0.3s ease, transform 0.2s ease;
}
.novel-tag:hover {
  transform: scale(1.05);
}

/* Reader page fade transition */
.reader-content { transition: opacity 0.3s ease; }
.reader-content.turning { opacity: 0; }

/* Scroll progress indicator */
.scroll-progress {
  position: fixed;
  top: 0; left: 0; height: 2px;
  background: var(--accent-primary);
  z-index: 9999;
  transition: width 0.1s linear;
  opacity: 0.6;
}

/* Back to top button appear animation */
.back-to-top {
  transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), visibility 0.3s ease;
}
.back-to-top.visible {

  visibility: visible !important;

}

/* Footer link hover underline animation */
.footer-link {

  display: inline-block;
}
.footer-link::after {

}

}

/* Search input focus glow */

}

/* ===== END NEW ANIMATIONS ===== */

/* Search */
.search-container { max-width: 500px; margin: 0 auto 35px; position: relative; }
.search-input {

}

.search-results { display: none; }

/* Hero Section */
.hero-section { background: var(--bg-card); border: 1px solid var(--border-light); padding: 24px; margin-bottom: 32px; display: flex; gap: 24px; align-items: center; transition: var(--transition); backdrop-filter: blur(10px); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5); }
.hero-section:hover { border-color: var(--border-hover); }

/* Stats Row */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 35px; }
.stat-item { background: var(--bg-card); border: 1px solid var(--border-light); padding: 20px; text-align: center; transition: var(--transition); border-radius: var(--radius-sm); backdrop-filter: blur(10px); }
.stat-item:hover { border-color: var(--border-hover); }
.stat-number { font-family: var(--font-display); font-size: 1.8rem; color: var(--accent-miku); font-weight: 700; }

/* Section Title with cross decoration */
.section-title { font-family: var(--font-display); font-size: 1.3rem; color: var(--text-primary); margin-bottom: 20px; padding-left: 14px; border-left: 2px solid var(--accent-primary); position: relative; letter-spacing: 2px; }

/* Category Grid */

.category-card {

.novel-item:hover .novel-title { color: var(--accent-primary); }
.novel-number { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: var(--accent-primary); border: 1px solid var(--border-light); flex-shrink: 0; transition: var(--transition); border-radius: var(--radius-sm); }

/* Reading progress badge on novel list */
.read-progress-badge {
  font-size: 0.7rem;
  color: var(--accent-primary);
  background: rgba(122, 158, 138, 0.08);
  padding: 2px 8px;
  margin-left: 8px;
  border-radius: var(--radius-sm);
}

/* Reader Page */
.reader-container { max-width: 680px; margin: 0 auto; padding: 10px 0 80px; }
.reader-header { text-align: center; padding: 25px 0 30px; border-bottom: 1px solid var(--border-light); margin-bottom: 35px; position: relative; }
.reader-header .reader-deco-line {
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
  opacity: 0.5;
}
.reader-category-tag { display: inline-block; padding: 4px 14px; border: 1px solid var(--border-light); font-size: 0.75rem; color: var(--accent-primary); margin-bottom: 12px; letter-spacing: 1px; transition: var(--transition); cursor: pointer; border-radius: var(--radius-sm); }
.reader-category-tag:hover { background: var(--accent-primary); color: white; }
.reader-title { font-family: var(--font-display); font-size: 1.5rem; color: var(--text-primary); margin-bottom: 8px; line-height: 1.6; word-break: break-all; }
.reader-meta { font-size: 0.8rem; color: var(--text-muted); }
.reader-author { font-size: 0.85rem; color: var(--accent-pink); margin-top: 6px; }

/* Reader action buttons */
.reader-actions {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.reader-action-btn {
  padding: 6px 16px;
  border: 1px solid var(--border-light);
  background: var(--bg-card);
  color: var(--text-muted);
  font-family: var(--font-serif);
  font-size: 0.8rem;
  cursor: pointer;
  transition: var(--transition);
  border-radius: var(--radius-sm);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.reader-action-btn:hover {
  border-color: var(--accent-primary);
  color: var(--accent-primary);
}
.reader-action-btn.active {
  background: var(--accent-primary);
  color: white;
  border-color: var(--accent-primary);
}
.reader-action-btn.copied {
  background: var(--accent-primary);
  color: white;
  border-color: var(--accent-primary);
}
.heart-icon {
  display: inline-block;
  width: 12px;
  height: 12px;
  border: 1.5px solid currentColor;
  border-top: none;
  border-right: none;
  transform: rotate(-45deg);
  margin-right: 4px;
  position: relative;
  vertical-align: middle;
}
.heart-icon::before {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  border: 1.5px solid currentColor;
  border-radius: 50%;
  border-bottom: none;
  border-right: none;
  top: -6px;
  left: -1.5px;
}
.heart-icon::after {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  border: 1.5px solid currentColor;
  border-radius: 50%;
  border-bottom: none;
  border-right: none;
  top: -1.5px;
  left: -7px;
}
.heart-icon.filled {
  background: currentColor;
  border-color: currentColor;
}
.heart-icon.filled::before, .heart-icon.filled::after {
  background: currentColor;
  border-color: currentColor;
}

/* Chapter title display in content area */
.reader-chapter-title {
  text-align: center;
  font-family: var(--font-display);
  font-size: 1.15rem;
  color: var(--text-primary);
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-light);
  letter-spacing: 2px;
}
/* Preface/notes in content area (AO3 style) */
.reader-preface-block {
  margin-bottom: 24px;
  padding: 16px 0;
  border-bottom: 1px dashed var(--border-light);
  font-size: var(--reader-font-size);
  color: var(--text-secondary);
  line-height: var(--reader-line-height, 1.9);
  text-align: justify;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Reader Settings */
.reader-settings { background: var(--bg-card); border: 1px solid var(--border-light); margin-bottom: 25px; border-radius: var(--radius-sm); }
.settings-header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: var(--transition); }
.settings-header:hover { background: rgba(122, 158, 138, 0.03); }
.settings-title { font-size: 0.85rem; color: var(--text-muted); }
.settings-toggle { color: var(--text-muted); font-size: 0.8rem; transition: transform 0.3s; }
.settings-panel { padding: 16px; border-top: 1px solid var(--border-light); display: none; }
.settings-panel.active { display: block; }
.settings-row { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
.settings-row:last-child { margin-bottom: 0; }
.settings-label { font-size: 0.8rem; color: var(--text-muted); width: 50px; flex-shrink: 0; }
.settings-select {
  flex: 1;
  padding: 4px 8px;
  border: 1px solid var(--border-light);
  background: var(--bg-card);
  color: var(--text-primary);
  font-family: var(--font-serif);
  font-size: 0.85rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.settings-slider { flex: 1; -webkit-appearance: none; height: 4px; background: var(--border-light); outline: none; }
.settings-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent-primary); cursor: pointer; border-radius: var(--radius-sm); }
.settings-value { font-size: 0.75rem; color: var(--accent-primary); width: 40px; text-align: right; }
.settings-btns { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-light); }
.settings-btn { padding: 5px 12px; border: 1px solid var(--border-light); background: transparent; color: var(--text-muted); font-size: 0.75rem; cursor: pointer; transition: var(--transition); border-radius: var(--radius-sm); }
.settings-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
.settings-btn.active { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }

/* Reader Content - Fixed drop cap */
.reader-content {
  background: var(--bg-card); border: 1px solid var(--border-light);
  padding: 35px 38px; font-size: var(--reader-font-size);
  line-height: var(--reader-line-height); color: var(--text-primary); transition: var(--transition);
  border-radius: var(--radius-sm);
  text-align: justify;
}
.reader-content p { margin-bottom: 1em; text-indent: 2em; line-height: 1.9; text-align: justify; text-justify: inter-ideograph; }
.reader-content p:first-child { text-indent: 0; }
.reader-content p:first-child::first-letter {
  font-size: 1.6em;
  float: none;
  line-height: 1.3;
  margin-right: 0;
  margin-top: 0;
  font-family: var(--font-display);
  color: var(--accent-primary);
  font-weight: 700;
}
.reader-content p:first-child {
  border-left: 3px solid var(--accent-primary);
  padding-left: 12px;
}

/* 章节管理区域（后台） */
.chapter-manager {
  margin-bottom: 16px;
  padding: 12px;
  border: 1px solid var(--border-light);
  background: var(--bg-secondary);
}
.chapter-manager-title {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.chapter-item {
  margin-bottom: 12px;
  padding: 10px;
  border: 1px solid var(--border-light);
  background: var(--bg-card);
  position: relative;
}
.chapter-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.chapter-item-header span {
  font-size: 0.75rem;
  color: var(--text-muted);
}
.chapter-item input[type="text"] {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid var(--border-light);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-serif);
  font-size: 0.85rem;
  margin-bottom: 8px;
  border-radius: var(--radius-sm);
}
.chapter-item textarea {
  width: 100%;
  min-height: 100px;
  padding: 8px 10px;
  border: 1px solid var(--border-light);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-serif);
  font-size: 0.85rem;
  resize: vertical;
  border-radius: var(--radius-sm);
}
.chapter-item input:focus, .chapter-item textarea:focus {
  outline: none;
  border-color: var(--accent-primary);
}
.chapter-add-btn {
  padding: 6px 14px;
  border: 1px dashed var(--border-hover);
  background: transparent;
  color: var(--accent-primary);
  font-family: var(--font-serif);
  font-size: 0.8rem;
  cursor: pointer;
  transition: var(--transition);
  border-radius: var(--radius-sm);
  width: 100%;
  text-align: center;
}
.chapter-add-btn:hover {
  border-color: var(--accent-primary);
  background: var(--bg-card);
}
.chapter-del-btn {
  padding: 2px 8px;
  border: 1px solid var(--text-muted);
  background: none;
  color: var(--text-muted);
  font-size: 0.7rem;
  cursor: pointer;
  font-family: var(--font-serif);
  transition: var(--transition);
  border-radius: var(--radius-sm);
}
.chapter-del-btn:hover {
  border-color: var(--accent-blood);
  color: var(--accent-blood);
}

/* Reader Nav */
.reader-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-light); }
.reader-nav-btn { padding: 10px 24px; border: 1px solid var(--border-light); background: var(--bg-card); color: var(--text-secondary); font-family: var(--font-serif); font-size: 0.85rem; cursor: pointer; transition: var(--transition); letter-spacing: 0.5px; border-radius: var(--radius-sm); }
.reader-nav-btn:hover { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }

/* ===== Admin Panel - Floating Drawer Style ===== */
.admin-drawer {
  position: fixed; top: 0; right: -820px; width: 800px; height: 100%;
  background: var(--bg-primary); border-left: 1px solid var(--border-light);
  z-index: 1500; transition: right 0.4s ease;
  overflow-y: auto;
  box-shadow: -8px 0 32px rgba(0,0,0,0.1);
}
.admin-drawer.active { right: 0; }
.admin-drawer-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.3); z-index: 1400; display: none;
}
.admin-drawer-overlay.active { display: block; }
.admin-drawer-header {
  padding: 24px; border-bottom: 1px solid var(--border-light);
  display: flex; justify-content: space-between; align-items: center;
}
.admin-drawer-header h3 { font-family: var(--font-display); font-size: 1.2rem; }
.admin-drawer-close { background: none; border: none; font-size: 1.2rem; color: var(--text-muted); cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
.close-x { display: inline-block; width: 14px; height: 14px; position: relative; }
.close-x::before, .close-x::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: currentColor; }
.close-x::before { transform: rotate(45deg); }
.close-x::after { transform: rotate(-45deg); }
.admin-star { display: inline-block; width: 10px; height: 10px; background: var(--accent-miku); position: relative; margin-right: 6px; vertical-align: middle; }
.admin-star::before, .admin-star::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--accent-miku); }
.admin-star::before { transform: rotate(45deg); }
.admin-star::after { transform: rotate(90deg); }
.admin-drawer-body { padding: 24px; }
.admin-form-row { margin-bottom: 16px; }
.admin-form-row label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; }
.admin-form-row input, .admin-form-row select, .admin-form-row textarea {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border-light);
  background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-serif);
  font-size: 0.9rem; transition: var(--transition);
  border-radius: var(--radius-sm);
}
.admin-form-row input:focus, .admin-form-row select:focus, .admin-form-row textarea:focus { outline: none; border-color: var(--accent-primary); }
.admin-form-row textarea { min-height: 120px; resize: vertical; }
.admin-btn {
  padding: 10px 24px; border: 1px solid var(--accent-primary); background: var(--accent-primary);
  color: white; font-family: var(--font-serif); font-size: 0.9rem; cursor: pointer;
  transition: var(--transition); margin-right: 10px;
  border-radius: var(--radius-sm);
}
.admin-btn:hover { background: transparent; color: var(--accent-primary); }
.admin-btn.secondary { background: transparent; color: var(--accent-primary); }
.admin-btn.secondary:hover { background: var(--accent-primary); color: white; }
.admin-btn.small { padding: 6px 14px; font-size: 0.8rem; margin-right: 8px; }
.admin-io-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light); }
.admin-io-bar .hint { font-size: 0.7rem; color: var(--text-muted); }
.admin-token-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light); }
.admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
.admin-table th, .admin-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border-light); font-size: 0.85rem; }
.admin-table th { color: var(--text-muted); font-weight: 500; }
.admin-table td { color: var(--text-secondary); }
.admin-table .admin-action { color: var(--accent-primary); cursor: pointer; margin-right: 10px; }
.admin-table .admin-action:hover { text-decoration: underline; }

/* Admin section group - extracted from inline styles */
.admin-section-group {
  border: 1px solid var(--border-light);
  padding: 16px;
  margin-bottom: 16px;
  border-radius: var(--radius-sm);
}
.admin-section-title {
  font-size: 0.85rem;
  color: var(--accent-primary);
  margin-bottom: 12px;
}

/* Login Modal */
.login-modal {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center;
}
.login-modal.active { display: flex; }
.login-box {
  background: var(--bg-primary); border: 1px solid var(--accent-primary); padding: 40px;
  max-width: 360px; width: 90%; text-align: center;
  border-radius: var(--radius-sm);
}
.login-box h3 { font-family: var(--font-display); font-size: 1.3rem; margin-bottom: 20px; }
.login-box input {
  width: 100%; padding: 12px 16px; margin-bottom: 16px; border: 1px solid var(--border-light);
  background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-serif);
  font-size: 0.9rem;
  border-radius: var(--radius-sm);
}
.login-box input:focus { outline: none; border-color: var(--accent-primary); }

/* ===== Timeline Page ===== */
.timeline { position: relative; padding-left: 30px; margin-bottom: 50px; }
.timeline::before { content: ''; position: absolute; left: 6px; top: 0; bottom: 0; width: 1px; background: var(--border-light); }
.timeline-item { position: relative; margin-bottom: 30px; padding-left: 25px; }
.timeline-item::before { content: ''; position: absolute; left: -28px; top: 6px; width: 8px; height: 8px; background: var(--accent-miku); border: 2px solid var(--bg-primary); }
.timeline-date { font-size: 0.8rem; color: var(--accent-primary); margin-bottom: 4px; }
.timeline-title { font-size: 1rem; color: var(--text-primary); margin-bottom: 4px; font-weight: 500; }
.timeline-desc { font-size: 0.85rem; color: var(--text-muted); }

/* ===== Guestbook Page ===== */
.guestbook-intro { border: 1px solid var(--border-light); border-bottom: none; padding: 20px 28px; margin-bottom: 0; background: var(--bg-card); backdrop-filter: blur(10px); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5); }
.guestbook-intro p { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }
.giscus-wrapper {
  border: 1px solid var(--border-light);
  padding: 20px;
  background: var(--bg-card);
}
[data-theme="dark"] .giscus-wrapper {
  background: var(--bg-primary);
}
[data-theme="dark"] .guestbook-intro {
  background: var(--bg-primary);
  border-color: var(--border-light);
}

/* ===== Links Page ===== */
.links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 50px; }
.link-card {
  background: var(--bg-card); border: 1px solid var(--border-light);
  padding: 24px; text-align: center; transition: var(--transition);
  text-decoration: none; color: inherit; display: block;
  border-radius: var(--radius-sm);
}
.link-card:hover {
  border-color: var(--border-hover);
  background: var(--bg-card-hover);
}
.link-card .link-icon { font-size: 2rem; margin-bottom: 10px; }
.link-card h4 { font-family: var(--font-display); font-size: 1rem; color: var(--text-primary); margin-bottom: 6px; }
.link-card p { font-size: 0.8rem; color: var(--text-muted); }

/* ===== ABOUT PAGE - Profile Style ===== */
.about-profile {
  max-width: 700px; margin: 0 auto; padding: 20px 0 60px;
}

/* Profile Header Card */
.about-header-card {
  background: var(--bg-card); border: 1px solid var(--border-light);
  padding: 40px; text-align: center; margin-bottom: 30px;
  position: relative;
  border-radius: var(--radius-sm);
}
.about-header-card .about-avatar {
  width: 100px; height: 100px; margin: 0 auto 20px;
  object-fit: cover;
  border: 2px solid var(--border-light);
  border-radius: var(--radius-sm);
  display: block;
}
.about-header-card h2 { font-family: var(--font-display); font-size: 1.8rem; color: var(--text-primary); margin-bottom: 4px; }
.about-header-card .about-handle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px; }

/* Social Links */
.social-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 10px; }
.social-link {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px; border: 1px solid var(--border-light);
  background: var(--bg-primary); color: var(--text-secondary);
  font-size: 0.8rem; text-decoration: none; transition: var(--transition);
  border-radius: var(--radius-sm);
  backdrop-filter: blur(10px);
}
.social-link:hover { border-color: var(--accent-primary); color: var(--accent-primary); transform: translateY(-2px); }
.social-link .social-icon { font-size: 1rem; }

/* Interest Cards */
.interest-section { margin-bottom: 25px; }
.interest-card {
  background: var(--bg-card); border: 1px solid var(--border-light);
  padding: 28px; margin-bottom: 16px;
  transition: var(--transition);
  border-radius: var(--radius-sm);
}
.interest-card:hover { border-color: var(--border-hover); }
.interest-card h3 {
  font-family: var(--font-display); font-size: 1.15rem; color: var(--text-primary);
  margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border-light);
  display: flex; align-items: center; gap: 8px;
}

.interest-card .interest-content { font-size: 0.9rem; color: var(--text-secondary); line-height: 2; }
.interest-card .interest-content .label { color: var(--text-muted); font-size: 0.8rem; margin-right: 6px; }
.interest-card .interest-content .value { color: var(--text-primary); }

/* Back Button */
.back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; margin-bottom: 18px; border: 1px solid var(--border-light); background: var(--bg-card); color: var(--text-secondary); font-family: var(--font-serif); font-size: 0.8rem; cursor: pointer; transition: var(--transition); border-radius: var(--radius-sm); }
.back-btn:hover { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }

/* Footer with rose divider */
.site-footer {
  text-align: center;
  padding: 45px 20px 35px;
  color: var(--text-muted);
  font-size: 0.75rem;
  border-top: 1px solid var(--border-light);
  margin-top: 30px;
  letter-spacing: 1px;
  position: relative;
}
.site-footer .footer-stars {
  margin-top: 8px;
  font-size: 0.6rem;
  color: var(--accent-primary);
  opacity: 0.35;
  letter-spacing: 8px;
}

/* Loading */
.loading-overlay { 
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
  background: var(--bg-primary); z-index: 9999; 
  display: flex; align-items: center; justify-content: center; 
  flex-direction: column; gap: 16px;
  transition: opacity 0.4s ease, visibility 0.4s ease; 
}
.loading-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.loading-ring {
  width: 36px; height: 36px;
  border: 2px solid var(--border-light);
  border-top-color: var(--accent-primary);
  border-radius: 50%;
  animation: ringSpin 0.8s linear infinite;
}
@keyframes ringSpin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Admin tabs */
.admin-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border-light); overflow-x: auto; }
.admin-tab {
  padding: 10px 14px; text-align: center; font-family: var(--font-serif);
  font-size: 0.85rem; color: var(--text-muted); background: none; border: none;
  cursor: pointer; transition: var(--transition); border-bottom: 2px solid transparent;
  margin-bottom: -1px; white-space: nowrap; flex-shrink: 0;
}
.admin-tab:hover { color: var(--text-primary); }
.admin-tab.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); }
.admin-tab-content { display: none; }
.admin-tab-content.active { display: block; }
.admin-edit-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.admin-edit-row input, .admin-edit-row textarea { flex: 1; padding: 6px 10px; border: 1px solid var(--border-light); background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-serif); font-size: 0.85rem; border-radius: var(--radius-sm); }
.admin-edit-row textarea { min-height: 200px; width: 100%; resize: vertical; }
.admin-textarea {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid var(--border-light);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-serif);
  font-size: 0.85rem;
  border-radius: var(--radius-sm);
  resize: vertical;
  min-height: 60px;
}
.admin-textarea:focus { outline: none; border-color: var(--accent-primary); }
.admin-small-btn { padding: 4px 12px; font-size: 0.75rem; border: 1px solid var(--accent-primary); background: var(--accent-primary); color: white; cursor: pointer; font-family: var(--font-serif); transition: var(--transition); border-radius: var(--radius-sm); }
.admin-small-btn:hover { background: transparent; color: var(--accent-primary); }
.admin-small-btn.cancel { border-color: var(--text-muted); color: var(--text-muted); background: none; }
.admin-small-btn.cancel:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
.admin-about-section { margin-bottom: 16px; }
.admin-about-section label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
.admin-about-section input, .admin-about-section textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border-light); background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-serif); font-size: 0.85rem; border-radius: var(--radius-sm); }
.admin-about-section textarea { min-height: 80px; resize: vertical; }

/* Typewriter effect for site title */
@keyframes typewriter {
  from { width: 0; }
  to { width: 100%; }
}
@keyframes blink-caret {
  from, to { border-color: transparent; }
  50% { border-color: var(--accent-primary); }
}

/* Responsive */
@media (max-width: 768px) {
  .app-container { padding: 0 16px; }
  .site-title { font-size: 2rem; letter-spacing: 5px; }
  .theme-toggle, .admin-toggle, .color-scheme-toggle { top: 10px; width: 36px; height: 36px; font-size: 0.8rem; }
  .top-toolbar { top: 10px; right: 10px; gap: 4px; }
  .color-scheme-dropdown { flex-shrink: 0; }
  .admin-drawer { width: 100%; right: -100%; }
  .hero-section { flex-direction: column; text-align: center; padding: 28px 24px; gap: 20px; }
  .hero-avatar { width: 80px; height: 80px; font-size: 2rem; }
  .hero-tags { justify-content: center; }
  .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .category-grid { grid-template-columns: 1fr; gap: 18px; }
  .content-with-sidebar { flex-direction: column; }
  .sidebar { width: 100%; }
  .sort-bar { flex-wrap: wrap; gap: 6px; }
  .novel-item { padding: 16px 18px; }
  .reader-content { padding: 24px 20px; font-size: var(--reader-font-size); }
  .reader-nav { flex-direction: column; gap: 10px; }
  .reader-nav-btn { width: 100%; text-align: center; }
  .nav-btn { padding: 6px 14px; font-size: 0.85rem; }
  .about-header-card { padding: 28px 20px; }
  .social-link { padding: 6px 12px; font-size: 0.75rem; }
  .links-grid { grid-template-columns: 1fr; }

  /* Mobile bottom navigation */
  .site-header { padding: 30px 0 15px; text-align: center; }
  .site-title { display: block; text-align: center; width: 100%; }
  .site-subtitle { display: block; text-align: center; width: 100%; }
  .site-divider { margin: 15px auto 0; }
  .nav-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: var(--bg-primary);
    border-top: 1px solid var(--border-light);
    padding: 8px 0;
    margin-bottom: 0;
    gap: 0;
    justify-content: space-around;
    box-shadow: 0 -1px 8px rgba(0,0,0,0.06);
    transition: transform 0.3s ease;
  }
  .nav-btn {
    padding: 6px 10px;
    font-size: 0.75rem;
    letter-spacing: 0;
    flex: 1;
    text-align: center;
  }
  .nav-btn::before { display: none; }
  .nav-btn::after { display: none; }
  .nav-btn.active { color: var(--accent-primary); background: rgba(122, 158, 138, 0.06); border-radius: var(--radius-sm); }

  /* Add bottom padding for content to avoid nav overlap */
  .app-container { padding-bottom: 80px; }
  .site-footer { padding-bottom: 80px; }
  .back-to-top { bottom: 100px; }
}

@media (max-width: 480px) {
  .site-title { font-size: 1.7rem; letter-spacing: 3px; }
  .search-container { margin-bottom: 25px; }
  .stats-row { grid-template-columns: 1fr; }
}

/* ===== ACCESSIBILITY: Reduced Motion ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}
</style>

<body>
<div class="loading-overlay" id="loadingOverlay">

      <button class="admin-btn small" onclick="saveGitHubToken()">保存令牌</button>

    <!-- Tab: 站点设置 -->

        </div>

    </div>

    <!-- Tab: 分类管理 -->

          <label>分类名称</label>

        <button class="admin-btn" onclick="addCategory()">添加分类</button>

    </div>

        </div>
        <div class="settings-panel" id="settingsPanel">
          <div class="settings-row" id="chapterSelectRow" style="display:none;">
            <span class="settings-label">章节</span>
            <select id="chapterSelect" class="settings-select" onchange="showNovel(currentNovelIndex, parseInt(this.value))"></select>
          </div>
          <div class="settings-row">

    const item = localStorage.getItem(key);
    if (!item) return defaultValue;
    return JSON.parse(item);
  } catch (e) {
    console.warn('Failed to parse localStorage item:', key, e);
    return defaultValue;
  }
}

  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) {
    console.warn('Failed to save to localStorage:', key, e);
    announceToScreenReader('保存失败，可能是存储空间不足');
    return false;
  }
}

// ===== ARIA Live Announcements =====
function announceToScreenReader(message) {

function showToast(message, type) {
  type = type || 'success';
  const existing = document.querySelector('.toast-notification');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast-notification toast-' + type;
  toast.textContent = message;
  toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;z-index:99999;font-size:0.85rem;font-family:var(--font-serif);border-radius:0px;animation:staggerFadeIn 0.3s ease both;pointer-events:none;';
  if (type === 'success') {
    toast.style.cssText += 'background:var(--accent-primary);color:white;border:1px solid var(--accent-primary);';
  } else if (type === 'error') {
    toast.style.cssText += 'background:var(--accent-rose);color:white;border:1px solid var(--accent-rose);';
  } else {
    toast.style.cssText += 'background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border-light);';
  }
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 2500);
}

// ===== GITHUB DATA SYNC =====
let githubSyncTimer = null;
function debouncedSyncToGitHub() {
  if (githubSyncTimer) clearTimeout(githubSyncTimer);
  githubSyncTimer = setTimeout(() => {
    syncToGitHub();
  }, 2000);
}

// Token is stored in localStorage (set once by admin, never in source code)
function getGitHubToken() {
  return localStorage.getItem('github_token') || '';
}
function setGitHubToken(token) {
  localStorage.setItem('github_token', token);
}

function saveGitHubToken() {
  const token = document.getElementById('githubTokenInput').value.trim();
  if (!token) { alert('请输入令牌'); return; }
  setGitHubToken(token);
  updateSyncUI();
  announceToScreenReader('令牌已保存');
  alert('令牌已保存！现在可以同步数据了。');
}

function initTokenInput() {
  const token = getGitHubToken();
  if (token) {
    document.getElementById('githubTokenInput').value = token;
  }
}

let githubSyncStatus = 'idle'; // idle | syncing | synced | error
let githubSha = null; // SHA of the current data.json on GitHub (for updates)

function buildSiteData() {
  // Exclude colorScheme from siteConfig as it's a user preference, not site data
  const { colorScheme, ...siteConfigWithoutColorScheme } = siteConfig;
  return {
    _version: 2,
    _updatedAt: new Date().toISOString(),
    categories: categories,
    aboutData: aboutData,
    siteConfig: siteConfigWithoutColorScheme,
    timelineData: timelineData,
    linksData: linksData
  };
}

function loadSiteData(data) {
  if (!data || !data.categories) return false;
  
  // GitHub is the single source of truth - always use remote data
  // (every save uploads the complete dataset, so remote is always the latest full snapshot)
  categories = data.categories;
  safeJSONStringify('categories', categories);
  
  if (data.siteConfig) {
    siteConfig = data.siteConfig;
    safeJSONStringify('siteConfig', siteConfig);
  }
  
  if (data.aboutData) {
    aboutData = data.aboutData;
    safeJSONStringify('aboutData', aboutData);
  }
  
  if (data.timelineData) { timelineData = data.timelineData; safeJSONStringify('timelineData', timelineData); }
  if (data.linksData) { linksData = data.linksData; safeJSONStringify('linksData', linksData); }
  
  return true;
}

async function syncToGitHub() {
  const token = getGitHubToken();
  if (!token) {
    console.log('[Sync] No GitHub token, skipping sync.');
    githubSyncStatus = 'error';
    updateSyncUI();
    return;
  }
  if (githubSyncStatus === 'syncing') return;
  githubSyncStatus = 'syncing';
  updateSyncUI();

  const content = JSON.stringify(buildSiteData(), null, 2);
  const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.dataFile}`;

  try {
    // First, try to get the current file SHA (needed for update)
    if (!githubSha) {
      try {
        const res = await fetch(url, {
          headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (res.ok) {
          const file = await res.json();
          githubSha = file.sha;
        }
      } catch (e) { /* file doesn't exist yet, that's fine */ }
    }

    // Create or update the file
    const body = {
      message: 'Update site data - ' + new Date().toLocaleString('zh-CN'),
      content: btoa(unescape(encodeURIComponent(content))),
      branch: GITHUB_CONFIG.branch
    };
    if (githubSha) body.sha = githubSha;

    const res = await fetch(url, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      const result = await res.json();
      githubSha = result.content.sha;
      githubSyncStatus = 'synced';
      console.log('[Sync] Data synced to GitHub successfully.');
    } else {
      const err = await res.json();
      console.error('[Sync] GitHub sync error:', err);
      // If SHA mismatch (409), refresh SHA and retry once
      if (res.status === 409 || (err.message && err.message.includes('SHA'))) {
        console.log('[Sync] SHA mismatch, refreshing and retrying...');
        githubSha = null;
        const retryUrl = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.dataFile}`;
        const shaRes = await fetch(retryUrl, {
          headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (shaRes.ok) {
          const shaFile = await shaRes.json();
          githubSha = shaFile.sha;
          // Retry the PUT with correct SHA
          body.sha = githubSha;
          const retryRes = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
            body: JSON.stringify(body)
          });
          if (retryRes.ok) {
            const retryResult = await retryRes.json();
            githubSha = retryResult.content.sha;
            githubSyncStatus = 'synced';
            console.log('[Sync] Retry succeeded.');
          } else {
            const retryErr = await retryRes.json();
            console.error('[Sync] Retry also failed:', retryErr);
            githubSyncStatus = 'error';
          }
        } else {
          githubSyncStatus = 'error';
        }
      } else {
        githubSyncStatus = 'error';
        if (err.message) console.error('[Sync] Error message:', err.message);
      }
    }
  } catch (e) {
    console.error('[Sync] GitHub sync failed:', e);
    githubSyncStatus = 'error';
  }
  updateSyncUI();
}

async function loadFromGitHub() {
  // Use raw.githubusercontent.com for reading — no API rate limit, no token needed
  const rawUrl = `https://raw.githubusercontent.com/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/${GITHUB_CONFIG.branch}/${GITHUB_CONFIG.dataFile}?t=${Date.now()}`;
  try {
    console.log('[Sync] Fetching latest data from GitHub (raw)...');
    const res = await fetch(rawUrl, { cache: 'no-cache' });
    if (!res.ok) {
      if (res.status === 404) {
        console.log('[Sync] No remote data file found, using local data.');
      } else {
        console.error('[Sync] Fetch failed with status', res.status);
      }
      return false;
    }
    const text = await res.text();
    const data = JSON.parse(text);
    console.log('[Sync] Successfully loaded data from GitHub, updated at:', data._updatedAt);
    // Also fetch SHA via API (with token if available) for later writes
    fetchGitHubSha();
    return loadSiteData(data);
  } catch (e) {
    console.error('[Sync] Failed to load from GitHub:', e);
    // Fallback: try to use localStorage data
    try {
      const localCategories = localStorage.getItem('categories');
      if (localCategories) {
        console.log('[Sync] GitHub fetch failed, using localStorage data as fallback.');
        return loadSiteData({
          categories: JSON.parse(localCategories),
          siteConfig: JSON.parse(localStorage.getItem('siteConfig') || 'null'),
          aboutData: JSON.parse(localStorage.getItem('aboutData') || 'null'),
          timelineData: JSON.parse(localStorage.getItem('timelineData') || 'null'),
          linksData: JSON.parse(localStorage.getItem('linksData') || 'null')
        });
      }
    } catch (fallbackErr) {
      console.error('[Sync] Fallback to localStorage also failed:', fallbackErr);
    }
    return false;
  }
}

// Fetch file SHA for write operations (only needed when saving)
async function fetchGitHubSha() {
  const token = getGitHubToken();
  if (!token) return;
  try {
    const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.dataFile}`;
    const res = await fetch(url, { headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' } });
    if (res.ok) {
      const file = await res.json();
      githubSha = file.sha;
    }
  } catch (e) { /* silent */ }
}

function updateSyncUI() {
  const el = document.getElementById('githubSyncStatus');
  if (!el) return;
  const statusMap = {
    idle: { text: '未同步', icon: '○' },
    syncing: { text: '同步中...', icon: '◎' },
    synced: { text: '已同步', icon: '●' },
    error: { text: '同步失败', icon: '✕' }
  };
  const s = statusMap[githubSyncStatus] || statusMap.idle;
  el.textContent = s.icon + ' ' + s.text;
  el.style.color = githubSyncStatus === 'synced' ? 'var(--accent-primary)' :
                    githubSyncStatus === 'error' ? 'var(--accent-rose)' :
                    githubSyncStatus === 'syncing' ? 'var(--text-muted)' : 'var(--text-muted)';
}

// ===== DATA IMPORT / EXPORT =====
function exportData() {
  const data = {
    _version: 2,
    _exportedAt: new Date().toISOString(),
    categories: categories,
    aboutData: aboutData,
    siteConfig: siteConfig,
    timelineData: timelineData,
    linksData: linksData,
    readProgress: readProgress,
    theme: localStorage.getItem('theme') || ''
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'site-data-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  announceToScreenReader('数据已导出');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.categories || !Array.isArray(data.categories)) {
        alert('文件格式不正确，缺少 categories 数据');
        return;
      }
      if (!confirm('导入将覆盖当前所有数据（小说、关于页等），确定继续吗？')) return;
      categories = data.categories;
      if (data.aboutData) { aboutData = data.aboutData; safeJSONStringify('aboutData', aboutData); }
      if (data.siteConfig) { siteConfig = data.siteConfig; safeJSONStringify('siteConfig', siteConfig); }
      if (data.timelineData) { timelineData = data.timelineData; safeJSONStringify('timelineData', timelineData); }
      if (data.linksData) { linksData = data.linksData; safeJSONStringify('linksData', linksData); }
      if (data.readProgress) { readProgress = data.readProgress; safeJSONStringify('readProgress', readProgress); }
      if (data.theme) { localStorage.setItem('theme', data.theme); }
      saveData();
      // Re-render everything
      renderStats();
      renderCategories();
      renderAboutPage();
      renderAdminEditNovelList();
      // Re-apply theme
      if (data.theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('themeToggle').textContent = '☀';
      } else {
        document.documentElement.removeAttribute('data-theme');
        document.getElementById('themeToggle').textContent = '☾';
      }
      announceToScreenReader('数据导入成功');
      alert('数据导入成功！');
    } catch (err) {
      alert('导入失败：文件解析错误\n' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ===== THEME =====
function initTheme() {
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeToggle').textContent = '☀';
  }
  document.getElementById('themeToggle').addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
      document.getElementById('themeToggle').textContent = '☾';
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
      document.getElementById('themeToggle').textContent = '☀';
    }
    updateBackgroundPattern();
    updateGiscusTheme();
  });

  // Real-time system theme listener
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
    if (!localStorage.getItem('theme')) {
      if (e.matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('themeToggle').textContent = '☀';
      } else {
        document.documentElement.removeAttribute('data-theme');
        document.getElementById('themeToggle').textContent = '☾';
      }
      updateBackgroundPattern();
      updateGiscusTheme();
    }
  });
}

// ===== COLOR SCHEME =====
function setColorScheme(scheme) {
  document.documentElement.setAttribute('data-color-scheme', scheme);
  localStorage.setItem('colorScheme', scheme);
  // Update active option and current dot
  document.querySelectorAll('.scheme-option').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.scheme === scheme);
  });
  // Update the current dot background
  const activeOption = document.querySelector('.scheme-option.active');
  const currentDot = document.getElementById('schemeCurrentDot');
  if (activeOption && currentDot) {
    const dot = activeOption.querySelector('.scheme-dot');
    if (dot) currentDot.style.background = dot.style.background;
  }
  // Close the dropdown menu
  const menu = document.getElementById('colorSchemeMenu');
  if (menu) menu.classList.remove('active');
  // Brief flash transition for background pattern
  document.body.style.opacity = '0.98';
  setTimeout(() => { document.body.style.opacity = '1'; }, 50);
  // Update background pattern color
  updateBackgroundPattern();
  updateGiscusTheme();
}

function initColorScheme() {
  const saved = localStorage.getItem('colorScheme');
  const scheme = saved || 'miku';
  document.documentElement.setAttribute('data-color-scheme', scheme);
  document.querySelectorAll('.scheme-option').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.scheme === scheme);
  });
  // Update the current dot background
  const activeOption = document.querySelector('.scheme-option.active');
  const currentDot = document.getElementById('schemeCurrentDot');
  if (activeOption && currentDot) {
    const dot = activeOption.querySelector('.scheme-dot');
    if (dot) currentDot.style.background = dot.style.background;

// ===== CANVAS with spatial grid optimization =====
function initCanvas() {
  const canvas = document.getElementById('bgCanvas');
  if (!canvas || canvas.style.display === 'none') return;
  const ctx = canvas.getContext('2d');
  let particles = [], mouseX = 0, mouseY = 0;
  let animationId;
  let isVisible = true;
  let lastMouseX = 0, lastMouseY = 0;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  // Respect prefers-reduced-motion
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReducedMotion) return;

  const particleCount = window.innerWidth < 768 ? 15 : 30;
  for (let i = 0; i < particleCount; i++) {
    particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3, size: Math.random() * 2 + 0.5, opacity: Math.random() * 0.25 + 0.05 });
  }

  // Use IntersectionObserver to pause when not visible
  const observer = new IntersectionObserver((entries) => {
    isVisible = entries[0].isIntersecting;
  });
  observer.observe(canvas);

  // Spatial grid for connection optimization
  const CELL_SIZE = 120;
  function buildGrid() {
    const grid = {};
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const cx = Math.floor(p.x / CELL_SIZE);
      const cy = Math.floor(p.y / CELL_SIZE);
      const key = cx + ',' + cy;
      if (!grid[key]) grid[key] = [];
      grid[key].push(i);
    }
    return grid;
  }

  function animate() {
    if (!isVisible) {
      animationId = requestAnimationFrame(animate);
      return;
    }

    // Check if canvas dimensions are valid
    if (canvas.width === 0 || canvas.height === 0) {
      animationId = requestAnimationFrame(animate);
      return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const color = isDark ? '122, 158, 138' : '122, 158, 138';

    // Smooth mouse follow
    lastMouseX += (mouseX - lastMouseX) * 0.1;
    lastMouseY += (mouseY - lastMouseY) * 0.1;

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const dx = lastMouseX - p.x, dy = lastMouseY - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) { p.vx -= dx * 0.00008; p.vy -= dy * 0.00008; }
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${color}, ${p.opacity})`;
      ctx.fill();
    }

    // Use spatial grid to reduce connection checks
    const grid = buildGrid();
    const checked = new Set();
    for (const key in grid) {
      const [cx, cy] = key.split(',').map(Number);
      // Check current cell and neighboring cells
      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          const nKey = (cx + dx) + ',' + (cy + dy);
          if (!grid[nKey]) continue;
          for (const i of grid[key]) {
            for (const j of grid[nKey]) {
              if (j <= i) continue;
              const pairKey = i < j ? i * 10000 + j : j * 10000 + i;
              if (checked.has(pairKey)) continue;
              checked.add(pairKey);
              const p1 = particles[i], p2 = particles[j];
              const d = Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2);
              if (d < 100) {
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = `rgba(${color}, ${0.06 * (1 - d / 100)})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
              }
            }
          }
        }
      }
    }

    animationId = requestAnimationFrame(animate);
  }
  animate();
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function highlightText(text, query) {
  const idx = text.toLowerCase().indexOf(query);
  if (idx === -1) return escapeHTML(text);
  const before = escapeHTML(text.slice(0, idx));
  const match = escapeHTML(text.slice(idx, idx + query.length));
  const after = escapeHTML(text.slice(idx + query.length));
  return before + '<span class="highlight">' + match + '</span>' + after;
}

// Simple SHA-256 hash function
async function sha256(message) {
  const encoder = new TextEncoder();
  const data = encoder.encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function animateCountUp(el) {
  const target = parseInt(el.dataset.target) || 0;
  const shouldFormat = el.dataset.format === '1';
  if (target === 0) { el.textContent = shouldFormat ? '-' : '0'; return; }
  const duration = 1200;
  const startTime = performance.now();
  function update(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    // Ease out cubic
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(target * eased);
    el.textContent = shouldFormat ? current.toLocaleString() : current;
    if (progress < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

      fallback.style.cssText = 'width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,var(--accent-primary-light),var(--accent-primary));display:flex;align-items:center;justify-content:center;font-size:2rem;color:white;opacity:0.6;';
      fallback.textContent = '✦';
      this.parentNode.insertBefore(fallback, this.nextSibling);
    };
    const body = document.createElement('div');
    body.className = 'category-body';
    body.innerHTML = `
      <div class="category-name">${escapeHTML(cat.name)}</div>
      <div class="category-desc">${escapeHTML(cat.desc)}</div>
      <div class="category-footer">
        <span class="category-count">${cat.novels.length} 篇小说</span>
        <span class="category-arrow">→</span>
      </div>
    `;
    div.appendChild(img);
    div.appendChild(body);
    grid.appendChild(div);
  });
  // Card entrance animation
  document.querySelectorAll('.category-card').forEach((card, i) => {
    card.style.opacity = '0';
    card.style.transform = 'translateY(20px)';
    setTimeout(() => {
      card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, 100 + i * 80);
  });
  // Mouse tilt effect for category cards (desktop only)
  if (!window.matchMedia('(hover: none)').matches) {
    document.querySelectorAll('.category-card').forEach(card => {
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const rotateX = (y - centerY) / centerY * -3;
      const rotateY = (x - centerX) / centerX * 3;
      card.style.transform = `perspective(600px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-2px)`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = 'perspective(600px) rotateX(0) rotateY(0) translateY(0)';
    });
  });
  }
}

// ===== CONTINUE READING =====
function renderContinueReading() {
  const container = document.getElementById('continueReading');
  const list = document.getElementById('continueReadingList');
  if (!container || !list) return;
  
  // Find novels with reading progress
  const items = [];
  Object.keys(readProgress).forEach(key => {
    const progress = readProgress[key];
    if (progress && progress > 0 && progress < 100) {
      // Find the novel across all categories
      for (const cat of categories) {
        const novel = cat.novels.find(n => n.id === key);
        if (novel) {
          items.push({ novel, cat, progress: progress });
          break;
        }
      }
    }
  });
  
  if (items.length === 0) {
    container.style.display = 'none';
    return;
  }
  
  container.style.display = 'block';
  list.innerHTML = '';
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'recent-card';
    div.setAttribute('role', 'button');
    div.setAttribute('tabindex', '0');
    div.onclick = () => goToNovel(item.cat.id, item.novel.id);
    div.onkeydown = (e) => { if (e.key === 'Enter') goToNovel(item.cat.id, item.novel.id); };
    div.innerHTML = `
      <div class="recent-info" style="flex:1;">
        <h4>${escapeHTML(item.novel.title)}</h4>
        <p>已读 ${Math.round(item.progress)}% · ${escapeHTML(item.cat.name)}</p>
        <div style="margin-top:6px;height:4px;background:var(--border-light);border-radius:2px;overflow:hidden;">
          <div style="height:100%;width:${item.progress}%;background:var(--accent-primary);border-radius:2px;transition:width 0.3s;"></div>
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}

// Scroll reveal observer
const scrollRevealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, { threshold: 0.1 });

function observeScrollReveal() {
  document.querySelectorAll('.scroll-reveal').forEach(el => scrollRevealObserver.observe(el));
}

function showPage(name, pushState) {
  if (pushState === undefined) pushState = true;
  
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const targetPage = document.getElementById('page-' + name);
  if (targetPage) targetPage.classList.add('active');
  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('searchInput').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Load Giscus when guestbook page is shown
  if (name === 'guestbook') {
    loadGiscus();
  }

  // Update page title
  document.title = PAGE_TITLES[name] || (siteConfig.siteName || '黒の猫窝');

  // Focus management
  if (targetPage) {
    targetPage.setAttribute('tabindex', '-1');
    targetPage.focus({ preventScroll: true });
  }

  // Update URL hash
  if (pushState) {
    if (name !== 'home') {
      window.history.pushState({ page: name }, '', '#/' + name);
    } else {
      window.history.pushState({ page: 'home' }, '', window.location.pathname);
    }
  }

  // Scroll reveal
  observeScrollReveal();
}

// ===== HASH ROUTER =====
function initHashRouter() {
  window.addEventListener('popstate', (e) => {
    if (e.state && e.state.page === 'category' && e.state.catId) {
      showCategory(e.state.catId);
    } else if (e.state && e.state.page === 'reader' && e.state.catId !== undefined) {
      const cat = categories.find(c => c.id === e.state.catId);
      if (cat) {
        currentCategory = cat;
        showNovel(e.state.novelIdx, e.state.chapterIdx);
      }
    } else {
      const page = (e.state && e.state.page) ? e.state.page : 'home';
      showPage(page, false);
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.page === page);
      });
    }
  });

  // Handle initial hash
  const hash = window.location.hash;
  if (hash && hash.startsWith('#/')) {
    const parts = hash.slice(2).split('/');
    const page = parts[0];
    if (parts[0] === 'category' && parts[1]) {
      showCategory(parts[1]);
    } else if (parts[0] === 'reader' && parts[1] && parts[2] !== undefined) {
      const cat = categories.find(c => c.id === parts[1]);
      if (cat) {
        currentCategory = cat;
        showNovel(parseInt(parts[2]), parseInt(parts[3]) || 0);
      }
    } else if (PAGE_TITLES[page]) {
      showPage(page, false);
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.page === page);
      });
    }
  }
}

    // Calculate reading time
    const readTime = Math.max(1, Math.round(novel.wordCount / 300));

function renderNovelList() {
  let novels = [...currentCategory.novels];
  if (currentAuthorFilter) novels = novels.filter(n => n.author === currentAuthorFilter);
  if (currentSort === 'date') novels.sort((a, b) => sortAscending ? new Date(a.date) - new Date(b.date) : new Date(b.date) - new Date(a.date));
  if (currentSort === 'words') novels.sort((a, b) => sortAscending ? a.wordCount - b.wordCount : b.wordCount - a.wordCount);
  renderFilteredNovelList(novels);
}

// ===== READER =====
let currentChapterIndex = 0; // 当前章节索引

function showNovel(index, chapterIdx) {
  currentNovelIndex = index;
  const novel = currentCategory.novels[index];

  // Page turn transition
  const readerContent = document.getElementById('readerContent');
  if (readerContent) {
    readerContent.classList.add('turning');
    setTimeout(() => readerContent.classList.remove('turning'), 300);
  }

  document.getElementById('readerCategory').textContent = currentCategory.name;
  document.getElementById('readerCategory').onclick = () => showCategory(currentCategory.id);
  document.getElementById('readerTitle').textContent = novel.title;

  // Calculate reading time
  const readTime = Math.max(1, Math.round(novel.wordCount / 300));
  document.getElementById('readerMeta').textContent = `${novel.date} · ${novel.wordCount} 字 · 约 ${readTime} 分钟 · ${Math.max(1, (novel.chapters || []).length)} 章 · ${novel.tags.join(' / ')}`;
  document.getElementById('readerAuthor').textContent = `作者：${novel.author}`;

  // 处理章节：向后兼容没有 chapters 字段的旧数据
  let chapters = [];
  if (novel.chapters && novel.chapters.length > 0) {
    chapters = novel.chapters;
  } else {
    chapters = [{ title: '全文', content: novel.content || '' }];
  }

  // 确定当前章节索引
  if (typeof chapterIdx === 'number' && chapterIdx >= 0 && chapterIdx < chapters.length) {
    currentChapterIndex = chapterIdx;
  } else {
    currentChapterIndex = 0;
  }

  const currentChapter = chapters[currentChapterIndex];

  // 渲染章节导航（仅多章节时显示）
  const contentDiv = document.getElementById('readerContent');
  const chapterSelectRow = document.getElementById('chapterSelectRow');
  const chapterSelect = document.getElementById('chapterSelect');
  if (chapters.length > 1) {
    chapterSelectRow.style.display = 'flex';
    chapterSelect.innerHTML = '';
    chapters.forEach((ch, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = ch.title;
      if (i === currentChapterIndex) opt.selected = true;
      chapterSelect.appendChild(opt);
    });
  } else {
    chapterSelectRow.style.display = 'none';
  }

  // 渲染当前章节内容
  contentDiv.innerHTML = '';

  // 前言（仅在第一章/全文时显示，放在章节标题上面）
  if (novel.preface && currentChapterIndex === 0) {
    const prefaceBlock = document.createElement('div');
    prefaceBlock.className = 'reader-preface-block';
    prefaceBlock.textContent = novel.preface;
    contentDiv.appendChild(prefaceBlock);
  }

  // 多章节时显示章节标题
  if (chapters.length > 1) {
    const chapterTitle = document.createElement('div');
    chapterTitle.className = 'reader-chapter-title';
    chapterTitle.textContent = currentChapter.title;
    contentDiv.appendChild(chapterTitle);
  }

  const paragraphs = currentChapter.content.split(/\n+/).filter(p => p.trim());
  paragraphs.forEach(p => {
    const para = document.createElement('p');
    para.textContent = p.trim();
    contentDiv.appendChild(para);
  });

  const prevBtn = document.getElementById('prevNovel');
  const nextBtn = document.getElementById('nextNovel');
  if (chapters.length > 1) {
    prevBtn.style.visibility = currentChapterIndex > 0 ? 'visible' : 'hidden';
    nextBtn.style.visibility = currentChapterIndex < chapters.length - 1 ? 'visible' : 'hidden';
    prevBtn.onclick = () => { if (currentChapterIndex > 0) showNovel(currentNovelIndex, currentChapterIndex - 1); };
    nextBtn.onclick = () => { if (currentChapterIndex < chapters.length - 1) showNovel(currentNovelIndex, currentChapterIndex + 1); };
    prevBtn.textContent = '\u2190 \u4e0a\u4e00\u7ae0';
    nextBtn.textContent = '\u4e0b\u4e00\u7ae0 \u2192';
  } else {
    // 单章节小说：切换不同小说
    prevBtn.style.visibility = index > 0 ? 'visible' : 'hidden';
    nextBtn.style.visibility = index < currentCategory.novels.length - 1 ? 'visible' : 'hidden';
    prevBtn.onclick = () => { if (index > 0) showNovel(index - 1); };
    nextBtn.onclick = () => { if (index < currentCategory.novels.length - 1) showNovel(index + 1); };
    prevBtn.textContent = '\u2190 \u4e0a\u4e00\u7bc7';
    nextBtn.textContent = '\u4e0b\u4e00\u7bc7 \u2192';
  }

  showPage('reader', false);
  window.history.replaceState({ page: 'reader', catId: currentCategory.id, novelIdx: index, chapterIdx: chapterIdx || 0 }, '', '#/reader/' + currentCategory.id + '/' + index + '/' + (chapterIdx || 0));
  // Set title AFTER showPage to avoid being overwritten
  document.title = novel.title + ' - ' + siteConfig.siteName;
}

// ===== AUTO-HIDE ON SCROLL (MOBILE ONLY) =====
function initReaderAutoHide() {
  // Only apply on mobile (screen width <= 768px)
  const mql = window.matchMedia('(max-width: 768px)');
  if (!mql.matches) return;

  const toolbar = document.querySelector('.top-toolbar');
  const navBar = document.querySelector('.nav-bar');
  const backToTop = document.getElementById('backToTop');
  if (!toolbar && !navBar) return;
  let lastScrollY = 0;
  let ticking = false;
  let isHidden = false;

  function onScroll() {
    const currentY = window.scrollY;
    const diff = currentY - lastScrollY;

    if (Math.abs(diff) > 10) {
      if (diff > 0 && currentY > 80 && !isHidden) {
        // Scrolling down - hide
        if (toolbar) toolbar.style.transform = 'translateY(-60px)';
        if (navBar) navBar.style.transform = 'translateY(100%)';
        if (backToTop) backToTop.classList.remove('visible');
        isHidden = true;
      } else if (diff < 0 && isHidden) {
        // Scrolling up - show
        if (toolbar) toolbar.style.transform = 'translateY(0)';
        if (navBar) navBar.style.transform = 'translateY(0)';
        isHidden = false;
      }
    }
    lastScrollY = currentY;
    ticking = false;
  }

  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(onScroll);
      ticking = true;
    }
  }, { passive: true });
}
